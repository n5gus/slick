services:
  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: slick-timescaledb
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: slick_ts
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - slick-net

  backend:
    depends_on:
      - timescale
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slick-backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # Mount the operator data directory for sqlite persistence across restarts
      - ./hyperliquid-operator/data:/app/hyperliquid-operator/data
    networks:
      - slick-net
      - nexwave-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: slick-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - slick-net
      - nexwave-net

networks:
  slick-net:
    driver: bridge
  nexwave-net:
    external: true
    name: nexwave-so_nexwave-network

volumes:
  timescale_data:
