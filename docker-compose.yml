services:
  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: slick-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: slick_ts
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - slick-net

  backend:
    depends_on:
      - timescale
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slick-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # Mount the operator data directory for sqlite persistence across restarts
      - ./hyperliquid-operator/data:/app/hyperliquid-operator/data
    networks:
      - slick-net
      - nexwave-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: slick-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - slick-net
      - nexwave-net

networks:
  slick-net:
    driver: bridge
  nexwave-net:
    external: true
    name: nexwave-so_nexwave-network

volumes:
  timescale_data:
